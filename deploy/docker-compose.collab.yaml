name: collabsphere

services:
  minio:
    profiles: ["local"]
    image: quay.io/minio/minio:${MINIO_IMAGE_VERSION:-RELEASE.2025-07-23T15-54-02Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BROWSER_REDIRECT_URL: "${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}"
    networks:
      - internal.network
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio.data:/data

  minio-init:
    profiles: ["local"]
    image: quay.io/minio/mc:${MINIO_MC_IMAGE_VERSION:-RELEASE.2025-07-21T05-28-08Z}
    restart: "no"
    env_file:
      - .env
    depends_on:
      - minio
    networks:
      - internal.network
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing local/"$${STORAGE_S3_BUCKET}"
        mc anonymous set private local/"$${STORAGE_S3_BUCKET}" || true
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      STORAGE_S3_BUCKET: "${STORAGE_S3_BUCKET:-collabsphere}"

  jitsi-web:
    profiles: ["local"]
    image: jitsi/web:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - jitsi-prosody
      - jitsi-jicofo
      - jitsi-jvb
    networks:
      - internal.network
    ports:
      - "${JITSI_HTTP_PORT:-8000}:80"
      - "${JITSI_HTTPS_PORT:-8443}:443"
    volumes:
      - jitsi.web.config:/config
      - jitsi.transcripts:/usr/share/jitsi-meet/transcripts
    environment:
      TZ: "${TZ:-UTC}"
      PUBLIC_URL: "${JITSI_PUBLIC_URL:-https://localhost:8443}"
      ENABLE_AUTH: "1"
      ENABLE_GUESTS: "0"
      ENABLE_HTTP_REDIRECT: "1"
      AUTH_TYPE: jwt
      JWT_APP_ID: "${JITSI_APP_ID:-collabsphere}"
      JWT_APP_SECRET: "${JITSI_APP_SECRET:-change-me-jitsi-secret}"
      JWT_ACCEPTED_ISSUERS: "${JITSI_ISSUER:-collabsphere}"
      JWT_ACCEPTED_AUDIENCES: "${JITSI_AUDIENCE:-jitsi}"
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_SERVER: xmpp.meet.jitsi
      XMPP_BOSH_URL_BASE: http://jitsi-prosody:5280
      XMPP_PORT: "5222"

  jitsi-prosody:
    profiles: ["local"]
    image: jitsi/prosody:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: unless-stopped
    env_file:
      - .env
    networks:
      internal.network:
        aliases:
          - xmpp.meet.jitsi
    expose:
      - "5222"
      - "5269"
      - "5280"
      - "5347"
    volumes:
      - jitsi.prosody.config:/config
      - jitsi.prosody.plugins:/prosody-plugins-custom
    environment:
      TZ: "${TZ:-UTC}"
      ENABLE_AUTH: "1"
      ENABLE_GUESTS: "0"
      AUTH_TYPE: jwt
      JWT_APP_ID: "${JITSI_APP_ID:-collabsphere}"
      JWT_APP_SECRET: "${JITSI_APP_SECRET:-change-me-jitsi-secret}"
      JWT_ACCEPTED_ISSUERS: "${JITSI_ISSUER:-collabsphere}"
      JWT_ACCEPTED_AUDIENCES: "${JITSI_AUDIENCE:-jitsi}"
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_HIDDEN_DOMAIN: recorder.meet.jitsi
      XMPP_RECORDER_DOMAIN: recorder.meet.jitsi
      JICOFO_AUTH_PASSWORD: "${JITSI_JICOFO_AUTH_PASSWORD:-change-me-focus-password}"
      JICOFO_COMPONENT_SECRET: "${JITSI_JICOFO_COMPONENT_SECRET:-change-me-component-secret}"
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: "${JITSI_JVB_AUTH_PASSWORD:-change-me-jvb-password}"
      XMPP_PORT: "5222"

  jitsi-jicofo:
    profiles: ["local"]
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - jitsi-prosody
    networks:
      - internal.network
    volumes:
      - jitsi.jicofo.config:/config
    environment:
      TZ: "${TZ:-UTC}"
      ENABLE_AUTH: "1"
      AUTH_TYPE: jwt
      ENABLE_AUTO_OWNER: "0"
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_SERVER: xmpp.meet.jitsi
      XMPP_PORT: "5222"
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: "${JITSI_JICOFO_AUTH_PASSWORD:-change-me-focus-password}"
      JICOFO_COMPONENT_SECRET: "${JITSI_JICOFO_COMPONENT_SECRET:-change-me-component-secret}"
      JVB_BREWERY_MUC: jvbbrewery
      JVB_XMPP_AUTH_DOMAIN: auth.meet.jitsi
      JVB_XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      JVB_XMPP_SERVER: xmpp.meet.jitsi
      JVB_XMPP_PORT: "5222"

  jitsi-jvb:
    profiles: ["local"]
    image: jitsi/jvb:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - jitsi-prosody
    networks:
      - internal.network
    ports:
      - "${JITSI_JVB_PORT:-10000}:${JITSI_JVB_PORT:-10000}/udp"
    volumes:
      - jitsi.jvb.config:/config
    environment:
      TZ: "${TZ:-UTC}"
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_SERVER: xmpp.meet.jitsi
      XMPP_PORT: "5222"
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: "${JITSI_JVB_AUTH_PASSWORD:-change-me-jvb-password}"
      JVB_BREWERY_MUC: jvbbrewery
      JVB_PORT: "${JITSI_JVB_PORT:-10000}"
      JVB_ADVERTISE_IPS: "${JITSI_JVB_ADVERTISE_IPS:-127.0.0.1}"
      PUBLIC_URL: "${JITSI_PUBLIC_URL:-https://localhost:8443}"

volumes:
  minio.data:
    name: minio.data
  jitsi.web.config:
    name: jitsi.web.config
  jitsi.transcripts:
    name: jitsi.transcripts
  jitsi.prosody.config:
    name: jitsi.prosody.config
  jitsi.prosody.plugins:
    name: jitsi.prosody.plugins
  jitsi.jicofo.config:
    name: jitsi.jicofo.config
  jitsi.jvb.config:
    name: jitsi.jvb.config

networks:
  internal.network:
    name: internal.network
    external: true
