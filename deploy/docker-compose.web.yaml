name: collabsphere

services:
  api:
    environment:
      AUTH_BROWSER_REDIRECT_ORIGINS: ${WEB_AUTH_BROWSER_REDIRECT_ORIGINS}

  web:
    profiles: [ "local", "prod" ]
    image: collabsphere-web:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - env/.env.web.dev
    build:
      context: ../web
      dockerfile: ../web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${WEB_NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_APP_BASE_URL: ${WEB_NEXT_PUBLIC_APP_BASE_URL}
        NEXT_INTERNAL_API_BASE_URL: ${WEB_NEXT_INTERNAL_API_BASE_URL}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_HOST_PORT}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - external.network
      - internal.network

  web-login:
    profiles: [ "local", "prod" ]
    image: collabsphere-web:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - env/.env.web.dev
      - env/.env.web.login.dev
    build:
      context: ../web
      dockerfile: ../web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${WEB_NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_APP_BASE_URL: ${WEB_NEXT_PUBLIC_APP_BASE_URL}
        NEXT_INTERNAL_API_BASE_URL: ${WEB_NEXT_INTERNAL_API_BASE_URL}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_LOGIN_HOST_PORT}:3000"
    volumes:
      - zitadel.shared:/zitadel:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/ui/v2/login/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    depends_on:
      zitadel:
        condition: service_healthy
    networks:
      - external.network
      - internal.network

networks:
  internal.network:
    name: ${INTERNAL_NETWORK_NAME}
    driver: bridge
    external: false
  external.network:
    name: ${EXTERNAL_NETWORK_NAME}
    external: true

volumes:
  zitadel.shared:
    name: zitadel.shared
