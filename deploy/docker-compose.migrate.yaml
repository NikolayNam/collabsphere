name: collabsphere

services:
  migrate:
    profiles: [ "migrate" ]
    image: colabsphere-api:${IMAGE_TAG}
    env_file:
      - .env.dev
    volumes:
      - ../platform/internal/runtime/infrastructure/db/migrations:/app/migrations:ro
    secrets:
      - dev_password
      - neon_password
      - platform_auto_grant_yaml
    networks:
      - internal.network
    command: [ "/migrate" ]
    restart: "no"
  seed:
    profiles: [ "seed" ]
    image: colabsphere-api:${IMAGE_TAG}
    env_file:
      - .env.dev
    volumes:
      - ../platform/internal/runtime/infrastructure/db/seeds:/app/seeds:ro
    secrets:
      - dev_password
      - neon_password
      - platform_auto_grant_yaml
    networks:
      - internal.network
    command: [ "/seed" ]
    restart: "no"

networks:
  internal.network:
    name: ${INTERNAL_NETWORK_NAME}
    external: true

secrets:
  dev_password:
    file: secrets/postgres/dev/db_password
  neon_password:
    file: secrets/postgres/prod/db_password
  platform_auto_grant_yaml:
    file: secrets/identity/platform_auto_grant.yaml
