name: collabsphere

services:
  master:
    profiles: [ "local" ]
    image: chrislusf/seaweedfs:${STORAGE_S3_IMAGE_VERSION:-4.15}
    ports:
      - 9333:9333
      - 19333:19333
      - 9324:9324
    command: 'master -ip=master -ip.bind=0.0.0.0 -metricsPort=9324'
  volume:
    image: chrislusf/seaweedfs # use a remote image
    ports:
      - 8081:8081
      - 18080:18080
      - 9325:9325
    command: 'volume -ip=volume -master="master:9333" -ip.bind=0.0.0.0 -port=8081 -metricsPort=9325'
    depends_on:
      - master
  filer:
    image: chrislusf/seaweedfs # use a remote image
    ports:
      - 8888:8888
      - 18888:18888
      - 9326:9326
    command: 'filer -ip=filer -master="master:9333" -ip.bind=0.0.0.0 -metricsPort=9326'
    tty: true
    stdin_open: true
    depends_on:
      - master
      - volume

  s3:
    profiles: [ "local" ]
    image: chrislusf/seaweedfs:${STORAGE_S3_IMAGE_VERSION:-4.15}
    env_file:
      - .env.dev
    networks:
      - internal.network
    ports:
      - 8333:8333
      - 9327:9327
    command: 's3 -filer="filer:8888" -ip.bind=0.0.0.0 -metricsPort=9327'
    volumes:
      - ./scripts:/bootstrap:ro
      - s3.data:/data
    depends_on:
      - master
      - volume
      - filer

volumes:
  s3.data:
    name: s3.data

networks:
  internal.network:
    name: internal.network
    driver: bridge
    external: false

secrets:
  s3_access_key:
    file: secrets/s3/s3_access_key
  s3_secret_key:
    file: secrets/s3/s3_secret_key