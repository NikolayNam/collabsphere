name: collabsphere

services:
  migrate:
    profiles: [ "migrate" ]
    image: colabsphere-api:${IMAGE_TAG}
    env_file:
      - .env.dev
    volumes:
      - ../platform/internal/runtime/infrastructure/db/migrations:/app/migrations:ro
      - ../platform/internal/runtime/infrastructure/db/seeds:/app/seeds:ro
    secrets:
      - dev_password
      - neon_password
    networks:
      - internal.network
    command: [ "/migrate" ]
    restart: "no"

networks:
  internal.network:
    name: internal.network
    external: true

secrets:
  dev_password:
    file: secrets/postgres/dev/db_password
  neon_password:
    file: secrets/postgres/prod/db_password
