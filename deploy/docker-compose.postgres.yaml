name: collabsphere

services:
  postgres:
    profiles: [ "local" ]
    image: postgres:18.3-trixie
    restart: unless-stopped
    hostname: "${POSTGRES_HOST}"
    networks:
      - internal.network
    env_file:
      - env/.env.dev
      - env/.env.postgres.dev
    secrets:
      - dev_postgres_password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d collabsphere" ]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres.data:/var/lib/postgresql

volumes:
  postgres.data:
    name: "postgres.data"
  postgres.data_test:
    name: "postgres.data_test"

networks:
  internal.network:
    name: ${INTERNAL_NETWORK_NAME}
    driver: bridge
    external: false

secrets:
  dev_postgres_password:
    file: secrets/postgres/dev/db_password
