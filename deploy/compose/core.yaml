name: collabsphere

services:
  postgres:
    profiles: ["local"]
    image: postgres:18.3-trixie
    restart: unless-stopped
    hostname: "${POSTGRES_HOST}"
    networks:
      - internal.network
    env_file:
      - ../env/.env.dev
      - ../env/.env.postgres.dev
    secrets:
      - dev_postgres_password
    healthcheck:
      test: ["CMD-SHELL", "sh /opt/healthcheck/postgres-collabsphere.sh"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres.data:/var/lib/postgresql
      - ../scripts/healthcheck/postgres-collabsphere.sh:/opt/healthcheck/postgres-collabsphere.sh:ro

  api:
    profiles: ["local", "prod"]
    image: colabsphere-api:${IMAGE_TAG}
    restart: unless-stopped
    build:
      context: ../../platform
      dockerfile: Dockerfile
    env_file:
      - ../env/.env.dev
      - ../env/.env.postgres.dev
      - ../env/.env.storage.dev
      - ../env/.env.redis.dev
      - ../env/.env.zitadel.dev
    secrets:
      - dev_postgres_password
      - neon_postgres_password
      - jwt_secret_key
      - s3_access_key
      - s3_secret_key
      - zitadel_client_secret
      - zitadel_admin_token
      - platform_auto_grant_yaml
      - redis_password
    networks:
      - internal.network
      - external.network
    extra_hosts:
      - "${AUTH_ZITADEL_DOCKER_HOST_ALIAS:-auth.localhost}:host-gateway"
    ports:
      - "${APPLICATION_PORT}:${APPLICATION_PORT}"
    volumes:
      - ../scripts/healthcheck/api-health.sh:/opt/healthcheck/api-health.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "sh /opt/healthcheck/api-health.sh"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 15s
    command: ["/api"]
    depends_on:
      postgres:
        condition: service_healthy

  web:
    profiles: ["web"]
    image: collabsphere-web:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../env/.env.web.dev
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${WEB_NEXT_PUBLIC_API_BASE_URL:-http://api.localhost:8080}
        NEXT_PUBLIC_APP_BASE_URL: ${WEB_NEXT_PUBLIC_APP_BASE_URL:-http://collabsphere.localhost:3002}
        NEXT_INTERNAL_API_BASE_URL: ${WEB_NEXT_INTERNAL_API_BASE_URL:-http://api:8080}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_HOST_PORT:-3002}:3000"
    volumes:
      - ../scripts/healthcheck/web-health.sh:/opt/healthcheck/web-health.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "sh /opt/healthcheck/web-health.sh"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - external.network
      - internal.network

  web-login:
    profiles: ["web"]
    image: collabsphere-web:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../env/.env.web.dev
      - ../env/.env.web.login.dev
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${WEB_NEXT_PUBLIC_API_BASE_URL:-http://api.localhost:8080}
        NEXT_PUBLIC_APP_BASE_URL: ${WEB_NEXT_PUBLIC_APP_BASE_URL:-http://collabsphere.localhost:3002}
        NEXT_INTERNAL_API_BASE_URL: ${WEB_NEXT_INTERNAL_API_BASE_URL:-http://api:8080}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_LOGIN_HOST_PORT:-3000}:3000"
    volumes:
      - zitadel.shared:/zitadel:ro
      - ../scripts/healthcheck/web-login-health.sh:/opt/healthcheck/web-login-health.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "sh /opt/healthcheck/web-login-health.sh"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    depends_on:
      zitadel:
        condition: service_healthy
    networks:
      - external.network
      - internal.network

networks:
  internal.network:
    name: ${INTERNAL_NETWORK_NAME}
    driver: bridge
    external: false
  external.network:
    name: ${EXTERNAL_NETWORK_NAME}
    external: true

volumes:
  postgres.data:
    name: "postgres.data"
  zitadel.shared:
    name: "zitadel.shared"

secrets:
  dev_postgres_password:
    file: ../secrets/postgres/dev/db_password
  neon_postgres_password:
    file: ../secrets/postgres/prod/db_password
  jwt_secret_key:
    file: ../secrets/jwt/jwt_secret_key
  s3_access_key:
    file: ../secrets/s3/s3_access_key
  s3_secret_key:
    file: ../secrets/s3/s3_secret_key
  zitadel_client_secret:
    file: ../secrets/identity/zitadel_client_secret
  zitadel_admin_token:
    file: ${AUTH_ZITADEL_ADMIN_TOKEN_SOURCE_FILE:-../fixtures/zitadel_admin_token.disabled}
  platform_auto_grant_yaml:
    file: ../secrets/identity/platform_auto_grant.yaml
  redis_password:
    file: ../secrets/redis/redis_password
