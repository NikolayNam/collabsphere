name: collabsphere

services:
  jitsi-web:
    profiles: [ "legacy-jitsi" ]
    image: jitsi/web:${JITSI_WEB_IMAGE_VERSION:-web-1.0.9105-1}
    restart: unless-stopped
    env_file:
      - .env.dev
    depends_on:
      - jitsi-prosody
      - jitsi-jicofo
      - jitsi-jvb
    secrets:
      - jitsi_secret
      - jicofo_auth_password
      - jicofo_component_secret
      - jvb_auth_password
    networks:
      - internal.network
    ports:
      - "${JITSI_HTTP_PORT:-8000}:80"
      - "${JITSI_HTTPS_PORT:-8443}:443"
    volumes:
      - ./scripts:/bootstrap:ro
      - jitsi.web.config:/config
      - jitsi.transcripts:/usr/share/jitsi-meet/transcripts
    entrypoint: ["/bin/sh", "/bootstrap/jitsi-web-entrypoint.sh"]

  jitsi-prosody:
    profiles: [ "legacy-jitsi" ]
    image: jitsi/prosody:${JITSI_PROSODY_IMAGE_VERSION:-prosody-13.0.4}
    restart: unless-stopped
    env_file:
      - .env.dev
    secrets:
      - jitsi_secret
      - jicofo_auth_password
      - jicofo_component_secret
      - jvb_auth_password
    networks:
      internal.network:
        aliases:
          - xmpp.meet.jitsi
    expose:
      - "5222"
      - "5269"
      - "5280"
      - "5347"
    volumes:
      - ./scripts:/bootstrap:ro
      - jitsi.prosody.config:/config
      - jitsi.prosody.plugins:/prosody-plugins-custom
    entrypoint: ["/bin/sh", "/bootstrap/jitsi-prosody-entrypoint.sh"]

  jitsi-jicofo:
    profiles: [ "legacy-jitsi" ]
    image: jitsi/jicofo:${JITSI_JICOFO_IMAGE_VERSION:-jicofo-1.0-1172-1}
    restart: unless-stopped
    env_file:
      - .env.dev
    depends_on:
      - jitsi-prosody
    secrets:
      - jicofo_auth_password
      - jicofo_component_secret
    networks:
      - internal.network
    volumes:
      - ./scripts:/bootstrap:ro
      - jitsi.jicofo.config:/config
    entrypoint: ["/bin/sh", "/bootstrap/jitsi-jicofo-entrypoint.sh"]

  jitsi-jvb:
    profiles: [ "legacy-jitsi" ]
    image: jitsi/jvb:${JITSI_JVB_IMAGE_VERSION:-jvb-2.3-272-g0360d0488-1}
    restart: unless-stopped
    env_file:
      - .env.dev
    depends_on:
      - jitsi-prosody
    secrets:
      - jvb_auth_password
    networks:
      - internal.network
    ports:
      - "${JITSI_JVB_PORT:-10000}:${JITSI_JVB_PORT:-10000}/udp"
    volumes:
      - ./scripts:/bootstrap:ro
      - jitsi.jvb.config:/config
    entrypoint: ["/bin/sh", "/bootstrap/jitsi-jvb-entrypoint.sh"]

volumes:
  jitsi.web.config:
    name: jitsi.web.config
  jitsi.transcripts:
    name: jitsi.transcripts
  jitsi.prosody.config:
    name: jitsi.prosody.config
  jitsi.prosody.plugins:
    name: jitsi.prosody.plugins
  jitsi.jicofo.config:
    name: jitsi.jicofo.config
  jitsi.jvb.config:
    name: jitsi.jvb.config

networks:
  internal.network:
    name: internal.network
    external: true

secrets:
  jitsi_secret:
    file: ../secrets/jitsi/jitsi_secret
  jicofo_auth_password:
    file: ../secrets/jitsi/jicofo_auth_password
  jicofo_component_secret:
    file: ../secrets/jitsi/jicofo_component_secret
  jvb_auth_password:
    file: ../secrets/jitsi/jvb_auth_password
