name: collabsphere

services:
  s3:
    profiles: [ "local" ]
    image: minio/minio:${STORAGE_S3_IMAGE_VERSION:-RELEASE.2025-09-07T16-13-09Z}
    restart: unless-stopped
    env_file:
      - .env.dev
    secrets:
      - s3_access_key
      - s3_secret
    networks:
      - internal.network
    ports:
      - "${STORAGE_S3_PORT:-9000}:9000"
      - "${STORAGE_S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./scripts:/bootstrap:ro
      - s3.data:/data
    entrypoint: ["/bin/sh", "/bootstrap/minio-entrypoint.sh"]

  s3-init:
    profiles: [ "local" ]
    image: minio/mc:${STORAGE_S3_MC_IMAGE_VERSION:-RELEASE.2025-07-21T05-28-08Z}
    restart: "no"
    env_file:
      - .env.dev
    depends_on:
      - s3
    secrets:
      - s3_access_key
      - s3_secret
    networks:
      - internal.network
    volumes:
      - ./scripts:/bootstrap:ro
    entrypoint: ["/bin/sh", "/bootstrap/minio-init.sh"]

volumes:
  s3.data:
    name: s3.data

networks:
  internal.network:
    name: internal.network
    driver: bridge
    external: false

secrets:
  s3_access_key:
    file: deploy/secrets/s3/s3_access_key
  s3_secret:
    file: deploy/secrets/s3/s3_secret