name: collabsphere

services:
  postgres:
    profiles: [ "local" ]
    image: postgres:18.2-bookworm
    restart: unless-stopped
    hostname: "${POSTGRES_HOST}"
    networks:
      - internal.network
    env_file:
      - .env.dev
    secrets:
      - dev_password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d collabsphere" ]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres.data:/var/lib/postgresql

volumes:
  postgres.data:
    name: "postgres.data"

networks:
  internal.network:
    name: internal.network
    driver: bridge
    external: false
  web.network:
    name: web.network
    external: true

secrets:
  dev_password:
    file: secrets/postgres/dev/db_password
