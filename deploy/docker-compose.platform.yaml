name: collabsphere

services:
  api:
    profiles: [ "local", "prod" ]
    image: colabsphere-api:${IMAGE_TAG}
    restart: unless-stopped
    build:
      context: ../platform                  # parent directory (collabsphere)
      dockerfile: ../platform/Dockerfile    # path to your Dockerfile relative to context
    env_file:
      - .env
    secrets:
      - dev_password
      - neon_password
      - jwt_secret
      - minio_secret
      - jitsi_secret
    networks:
      - internal.network
      - web.network
    ports:
      - "${APPLICATION_PORT}:${APPLICATION_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsSL http://localhost:8080/health" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: [ "/api" ]
    depends_on:
      postgres:
        condition: service_healthy

networks:
  internal.network:
    name: internal.network
    driver: bridge
    external: false
  web.network:
    name: web.network
    external: true

secrets:
  dev_password:
    file: secrets/postgres/dev/db_password
  neon_password:
    file: secrets/postgres/prod/db_password
  jwt_secret:
    file: secrets/jwt/jwt_secret
  minio_secret:
    file: ../secrets/minio/minio_secret
  jitsi_secret:
    file: ../secrets/jitsi/jitsi_secret
